<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PB Hero Bot - Gateway Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060913;
            --panel-bg: rgba(13, 20, 38, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-accent: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --error-color: #f43f5e;
            --shadow-glow: 0 8px 32px 0 rgba(99, 102, 241, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(99, 102, 241, 0.12) 0px, transparent 45%),
                radial-gradient(at 90% 80%, rgba(168, 85, 247, 0.12) 0px, transparent 45%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .login-card {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 48px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: var(--primary-gradient);
            z-index: -1;
            border-radius: 28px;
            opacity: 0.15;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
        }

        .logo-glow {
            width: 72px;
            height: 72px;
            background: var(--primary-gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px;
            box-shadow: var(--shadow-glow);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); box-shadow: 0 8px 32px 0 rgba(99, 102, 241, 0.2); }
            50% { transform: scale(1.02); box-shadow: 0 12px 48px 0 rgba(168, 85, 247, 0.4); }
            100% { transform: scale(0.98); box-shadow: 0 8px 32px 0 rgba(99, 102, 241, 0.2); }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 36px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(6, 9, 19, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px 20px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
            background: rgba(6, 9, 19, 0.8);
        }

        .btn-submit {
            width: 100%;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            padding: 16px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--shadow-glow);
            margin-top: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(168, 85, 247, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 16px;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-glow">🚀</div>
        <h1>PB Hero Bot</h1>
        <p class="subtitle">GPLinks Affiliate Deal Control Portal</p>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="admin-password">Console Secret Key</label>
                <div class="input-wrapper">
                    <input type="password" id="admin-password" placeholder="Enter dashboard access password" required autofocus>
                </div>
            </div>
            
            <button type="submit" class="btn-submit" id="btn-login">Unlock Console ➔</button>
            <div id="error-box" class="error-message">Incorrect password. Access denied.</div>
        </form>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const passwordField = document.getElementById("admin-password");
            const errorBox = document.getElementById("error-box");
            const loginBtn = document.getElementById("btn-login");
            const pwd = passwordField.value.strip ? passwordField.value.strip() : passwordField.value;

            errorBox.style.display = "none";
            loginBtn.innerText = "Authenticating...";
            loginBtn.disabled = true;

            try {
                const response = await fetch("/api/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ password: pwd })
                });

                if (response.ok) {
                    // Success: redirect to console homepage
                    window.location.reload();
                } else {
                    const data = await response.json();
                    errorBox.innerText = data.detail || "Authentication Failed!";
                    errorBox.style.display = "block";
                    passwordField.value = "";
                    passwordField.focus();
                }
            } catch (err) {
                errorBox.innerText = "Network error occurred. Try again.";
                errorBox.style.display = "block";
            } finally {
                loginBtn.innerText = "Unlock Console ➔";
                loginBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
